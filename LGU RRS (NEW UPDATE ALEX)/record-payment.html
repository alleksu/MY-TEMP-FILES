<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Record Payment — LGU RRS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="record-payment.css">
</head>
<body>
<div id="page-app" class="page active" style="flex-direction:column">

  <div class="topnav">
    <div class="topnav-brand">
      <img src="lgu.png">
      <p style="margin:0"><span class="lgu-text">LGU</span><span class="rev-text">Revenue</span></p>
    </div>
    <div class="topnav-right">
      <div class="topnav-user-pill">Manansala, Luffy D.</div>
      <div class="topnav-avatar" onclick="doLogout()">LM</div>
    </div>
  </div>

  <div class="app-body">
    <div class="sidebar">
      <div class="sidebar-section-label">Main</div>
      <div class="nav-item" onclick="window.location.href='dashboard.html'">
        <svg width="16" height="16" fill="none" viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor"/></svg>
        Workspace
      </div>
      <div class="nav-item active" onclick="window.location.href='record-payment.html'">
        <svg width="16" height="16" fill="none" viewBox="0 0 16 16"><path d="M2 3a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3Z" stroke="currentColor" stroke-width="1.5"/><path d="M5 8h6M5 11h4M5 5h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Record Payment
      </div>
      <div class="nav-item" onclick="window.location.href='records.html'">
        <svg width="16" height="16" fill="none" viewBox="0 0 16 16"><path d="M3 2h10a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1Z" stroke="currentColor" stroke-width="1.5"/><path d="M5 6h6M5 9h6M5 12h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Records
      </div>
      <div class="nav-item" onclick="window.location.href='revenue-type.html'">
        <svg width="16" height="16" fill="none" viewBox="0 0 16 16"><rect x="1" y="1" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M5 5h6M5 8h6M5 11h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Revenue Type
      </div>
      <div class="sidebar-section-label">Administration</div>
      <div class="nav-item" onclick="window.location.href='generate-report.html'">
        <svg width="16" height="16" fill="none" viewBox="0 0 16 16"><path d="M2 14V2h8l4 4v8H2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M10 2v4h4M5 7h6M5 10h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Generate Report
      </div>
<div style="flex:1"></div>
      <button class="logout-btn" onclick="doLogout()">
        <svg width="16" height="16" fill="none" viewBox="0 0 18 18"><path d="M7 3H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h4M12 13l4-4-4-4M16 9H7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Logout
      </button>
    </div>

    <div class="main-content">
      <div class="content-page">
        <div class="page-header-row">
          <div class="back-btn" onclick="window.location.href='dashboard.html'">←</div>
          <div>
            <div class="page-title">Encoding Payment</div>
            <div class="page-sub">Recording a new payment for a payor</div>
          </div>
        </div>

        <!-- PAYOR INFORMATION -->
        <div class="form-section">
          <div class="section-title-row">
            <div class="section-title" style="margin-bottom:0;padding-bottom:0;border-bottom:none">Payor Information</div>
            <button class="add-payor-btn" onclick="openModal('payor-modal')">
              <svg width="14" height="14" fill="none" viewBox="0 0 16 16"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              Add New Payor
            </button>
          </div>

          <!-- Payor search bar -->
          <div class="payor-search-wrap">
            <div class="payor-search-bar">
              <svg width="15" height="15" fill="none" viewBox="0 0 16 16"><circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/><path d="M10.5 10.5l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              <input type="text" id="payor-search" placeholder="Search existing payor by name or contact…" oninput="searchPayors(this.value)" autocomplete="off">
            </div>
            <div class="payor-dropdown" id="payor-dropdown"></div>
          </div>

          <!-- Selected payor card (hidden until payor chosen) -->
          <div class="selected-payor-card hidden" id="selected-payor-card">
            <div class="selected-payor-info">
              <div class="selected-payor-avatar" id="sel-avatar">—</div>
              <div>
                <div class="selected-payor-name" id="sel-name">—</div>
                <div class="selected-payor-meta" id="sel-meta">—</div>
              </div>
            </div>
            <button class="clear-payor-btn" onclick="clearPayor()">✕ Clear</button>
          </div>

          <!-- Hidden payor fields populated on select -->
          <input type="hidden" id="pay-fname">
          <input type="hidden" id="pay-mname">
          <input type="hidden" id="pay-lname">
          <input type="hidden" id="pay-suffix">
          <input type="hidden" id="pay-contact">
          <input type="hidden" id="pay-email">
          <input type="hidden" id="pay-address">
        </div>

        <!-- PAYMENT INFORMATION -->
        <div class="form-section">
          <div class="section-title">Payment Information</div>
          <div class="form-grid-2">
            <div class="form-group">
              <label class="form-label">Transaction ID</label>
              <div class="txn-id-wrap">
                <input type="text" class="form-input" id="pay-txnid" placeholder="Auto-generated" readonly>
                <button class="txn-regen-btn" onclick="regenTxnId()" title="Regenerate">
                  <svg width="13" height="13" fill="none" viewBox="0 0 16 16"><path d="M13.5 2.5A6.5 6.5 0 1 0 14 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M14 2.5V6h-3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">OR / Record ID</label>
              <input type="text" class="form-input" placeholder="e.g. 00001" id="pay-orid">
            </div>
            <div class="form-group">
              <label class="form-label">Date Issued *</label>
              <input type="date" class="form-input" id="pay-date">
            </div>
            <div class="form-group">
              <label class="form-label">Collector *</label>
              <input type="text" class="form-input" placeholder="Name of collecting officer" id="pay-collector">
            </div>
            <div class="form-group">
              <label class="form-label">Collection Type *</label>
              <select class="form-select" id="pay-coltype">
                <option value="">-- Select Type --</option>
                <option>Business Tax</option>
                <option>Mayor's Permit</option>
                <option>Real Property Tax</option>
                <option>Market Stall Fee</option>
                <option>CTC</option>
                <option>Water Fees</option>
                <option>Burial Permit</option>
                <option>Building Permit</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Payment Mode</label>
              <select class="form-select" id="pay-mode">
                <option>Cash</option>
                <option>Check</option>
                <option>Online Transfer</option>
              </select>
            </div>
            <div class="form-group span-2">
              <label class="form-label">Remarks</label>
              <textarea class="form-input" placeholder="Optional notes…" id="pay-remarks" style="min-height:60px"></textarea>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button class="btn-secondary" onclick="window.location.href='dashboard.html'">Cancel</button>
          <button class="btn-save" onclick="savePayment()">Save Payment</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ADD NEW PAYOR MODAL -->
<div class="modal-overlay" id="payor-modal">
  <div class="modal" style="max-width:540px">
    <div class="modal-title">Add New Payor</div>
    <div class="modal-sub">Fill in the payor's details. Fields marked * are required.</div>
    <div class="form-grid-2" style="gap:10px 16px">
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">First Name *</label>
        <input type="text" class="form-input" placeholder="e.g. Juan" id="new-fname">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Middle Name</label>
        <input type="text" class="form-input" placeholder="Optional" id="new-mname">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Last Name *</label>
        <input type="text" class="form-input" placeholder="e.g. Cruz" id="new-lname">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Suffix</label>
        <input type="text" class="form-input" placeholder="Sr., Jr., III…" id="new-suffix">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Contact No.</label>
        <input type="text" class="form-input" placeholder="09XX-XXX-XXXX" id="new-contact">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-input" placeholder="Optional" id="new-email">
      </div>
      <div class="form-group span-2" style="margin-bottom:0">
        <label class="form-label">Residence Address</label>
        <textarea class="form-input" placeholder="Complete address" id="new-address" style="min-height:60px"></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('payor-modal')">Cancel</button>
      <button class="btn-save" onclick="saveNewPayor()">Save Payor</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="shared.js"></script>
<script src="record-payment.js"></script>
</body>
</html>
